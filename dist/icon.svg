<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo con esquinas redondeadas -->
  <rect width="512" height="512" rx="115" fill="url(#grad)"/>

  <!-- Casa estilizada -->
  <g transform="translate(256, 256)">
    <!-- Techo -->
    <path d="M -120 -60 L 0 -140 L 120 -60 L 100 -60 L 100 -40 L -100 -40 L -100 -60 Z"
          fill="#FFF" opacity="0.95"/>

    <!-- Paredes -->
    <rect x="-100" y="-40" width="200" height="180"
          fill="#FFF" opacity="0.95" rx="8"/>

    <!-- Puerta -->
    <rect x="-35" y="60" width="70" height="80"
          fill="#357ABD" rx="6"/>

    <!-- Ventanas -->
    <rect x="-80" y="0" width="50" height="45"
          fill="#4A90E2" rx="4"/>
    <rect x="30" y="0" width="50" height="45"
          fill="#4A90E2" rx="4"/>

    <!-- Detalles ventanas -->
    <line x1="-55" y1="0" x2="-55" y2="45" stroke="#FFF" stroke-width="3"/>
    <line x1="-80" y1="22.5" x2="-30" y2="22.5" stroke="#FFF" stroke-width="3"/>
    <line x1="55" y1="0" x2="55" y2="45" stroke="#FFF" stroke-width="3"/>
    <line x1="30" y1="22.5" x2="80" y2="22.5" stroke="#FFF" stroke-width="3"/>

    <!-- Chimenea -->
    <rect x="60" y="-120" width="30" height="60"
          fill="#FFF" opacity="0.9" rx="4"/>

    <!-- Símbolo $ en la puerta -->
    <text x="0" y="115" font-family="Arial, sans-serif" font-size="50"
          font-weight="bold" fill="#FFF" text-anchor="middle">$</text>
  </g>
</svg>
